spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.sql.init.mode=never

jwt.secret=test-secret-key-for-testing-purposes-must-be-at-least-256-bits-long-abcdefghijklmnop

#cloudflare.turnstile.secret-key=${TURNSTILE_SECRET_KEY}
cloudflare.turnstile.secret-key=test-turnstile-key-for-testing
cloudflare.turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify