include:
  - ./docker-compose-dev.yml

services:
  backend:
      build: .
      container_name: shopping_backend
      ports:
        - "8080:8080"
      environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/shopping
        - SPRING_DATASOURCE_USERNAME=postgres
        - SPRING_DATASOURCE_PASSWORD=postgres
        - SPRING_DATA_REDIS_HOST=redis
        - SPRING_DATA_REDIS_PORT=6379
        - SPRING_RABBITMQ_HOST=rabbitmq
        - UPLOAD_PATH=uploads
        - SPRING_JPA_SHOW-SQL=false
        - SPRINGDOC_API_DOCS_ENABLED=false
        - SPRINGDOC_SWAGGER_UI_ENABLED=false
        - APP_PUBLIC_URL=https://localhost
        - FRONTEND_PUBLIC_URL=https://localhost
        - FRONTEND_ACCOUNT_URL=https://localhost/account
        - FRONTEND_PASSWORD_RESET_URL=https://localhost/account/reset-password
      env_file:
        - .env
      volumes:
        - ./uploads:/app/uploads
      depends_on:
        - postgres
        - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://localhost/api/v1
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://localhost/api/v1
      - BACKEND_URL=http://backend:8080/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend